# Drift detection thresholds for monitoring (notebooks/03_monitoring.py)
# Reference: PSI rules of thumb in financial-services / marketing analytics

psi:
  warning: 0.10   # 0.10-0.25 = monitor closely
  alert:   0.25   # >= 0.25 = significant change, investigate

ks:
  warning: 0.10
  alert:   0.20

wasserstein:
  # Relative to the std of the reference distribution
  warning_relative: 0.20
  alert_relative:   0.50

# Severity escalation policy
escalation:
  consecutive_alerts_for_critical: 3   # 3 consecutive 'alert' days → 'critical'
  retrain_after_critical:          true
